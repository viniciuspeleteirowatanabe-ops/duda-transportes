<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Gastos Pro</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
      h2 { 
    color: #2c3e50; 
    margin-top: 0; 
    display: flex; 
    align-items: center; 
    gap: 15px; 
}
h3 { 
    color: #2c3e50; 
    margin-top: 0; 
}
.logo-empresa {
    height: 100px; 
    width: auto;  
}
        
        /* Formulário e Filtros */
        .form-inline { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* Botões */
        button { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; align-self: flex-end; }
        button:hover { background: #27ae60; }
        .btn-filter { background: #34495e; padding: 6px 12px; font-size: 13px; text-decoration: none; color: white; border-radius: 4px; }
        .btn-filter.active { background: #2980b9; }
        .btn-edit { color: #2980b9; text-decoration: none; margin-right: 10px; font-weight: bold; }
        .btn-delete { color: #c0392b; text-decoration: none; font-weight: bold; }
        
        /* Filtros alinhamento */
        .filters { margin-bottom: 15px; display: flex; gap: 5px; background: #e9ecef; padding: 10px; border-radius: 6px; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eceff1; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f8f9fa; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-normal { background: #d4edda; color: #155724; }
        .badge-multa { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="container">
       <h2>
        <img src="/logo.png" alt="Logo" class="logo-empresa">
    Gerenciador de Gastos  
        
</h2>
        
        <form th:action="@{/adicionar}" method="POST" class="form-inline">
            <input type="hidden" name="id" th:value="${gastoForm != null ? gastoForm.id : 0}">
            
            <div class="form-group">
                <label>Descrição:</label>
                <input type="text" name="descricao" th:value="${gastoForm != null ? gastoForm.descricao : ''}" required placeholder="Ex: Combustível">
            </div>
            
            <div class="form-group">
                <label>Valor (R$):</label>
                <input type="number" step="0.01" name="valor" th:value="${gastoForm != null ? gastoForm.valor : ''}" required placeholder="0.00">
            </div>
            
            <div class="form-group">
                <label>Tipo de Gasto:</label>
                <select name="tipo">
                    <option value="NORMAL" th:selected="${gastoForm != null && gastoForm.tipo == 'NORMAL'}">Gasto Normal</option>
                    <option value="MULTA" th:selected="${gastoForm != null && gastoForm.tipo == 'MULTA'}">Multa</option>
                </select>
            </div>
            
            <button type="submit" th:text="${gastoForm != null && gastoForm.id != 0 ? 'Atualizar' : 'Salvar'}">Salvar</button>
            <a th:if="${gastoForm != null && gastoForm.id != 0}" th:href="@{/}" style="align-self: flex-end; padding: 10px; color: #7f8c8d;">Cancelar</a>
        </form>

        <h3>Histórico</h3>
        <div class="filters">
            <span style="align-self: center; margin-right: 10px; font-weight: bold; font-size: 14px;">Filtrar por:</span>
            <a th:href="@{/(filtroTipo='TODOS')}" class="btn-filter" th:classappend="${filtroAtual == 'TODOS' ? 'active' : ''}">Todos</a>
            <a th:href="@{/(filtroTipo='NORMAL')}" class="btn-filter" th:classappend="${filtroAtual == 'NORMAL' ? 'active' : ''}">Gastos Normais</a>
            <a th:href="@{/(filtroTipo='MULTA')}" class="btn-filter" th:classappend="${filtroAtual == 'MULTA' ? 'active' : ''}">Multas</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="gasto : ${gastos}">
                    <td th:text="${gasto.descricao}">Descrição</td>
                    <td>
                        <span th:text="${gasto.tipo == 'NORMAL' ? 'Normal' : 'Multa'}" 
                              th:class="${gasto.tipo == 'NORMAL' ? 'badge badge-normal' : 'badge badge-multa'}"></span>
                    </td>
                    <td th:text="'R$ ' + ${gasto.valor}">R$ 0.00</td>
                    <td>
                        <a th:href="@{/editar/{id}(id=${gasto.id})}" class="btn-edit">Editar</a>
                        <a th:href="@{/deletar/{id}(id=${gasto.id})}" class="btn-delete" onclick="return confirm('Deseja mesmo excluir este gasto?')">Excluir</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(gastos)}">
                    <td colspan="4" style="text-align: center; color: #7f8c8d;">Nenhum gasto encontrado neste filtro.</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
