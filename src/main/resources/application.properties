spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:dados_empresa}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:1001}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Linha importante para o Hibernate criar as tabelas automaticamente se não existirem
spring.jpa.hibernate.ddl-auto=updategit add .
